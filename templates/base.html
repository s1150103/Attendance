<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}出勤簿{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; }
    .navbar-brand { font-weight: bold; }
    .card { box-shadow: 0 2px 8px rgba(0,0,0,.08); }
  </style>
</head>
<body>
{% if user is defined and user %}
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container">
    <a class="navbar-brand" href="/dashboard">📋 出勤簿</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link" href="/dashboard">ダッシュボード</a></li>
        <li class="nav-item"><a class="nav-link" href="/report">月次レポート</a></li>
        {% if user.is_admin %}
        <li class="nav-item"><a class="nav-link" href="/admin/users">ユーザー管理</a></li>
        {% endif %}
      </ul>
      <span class="navbar-text text-white me-3">{{ user.display_name }} さん</span>
      <form method="post" action="/logout" class="d-inline">
        <button type="submit" class="btn btn-outline-light btn-sm">ログアウト</button>
      </form>
    </div>
  </div>
</nav>
{% endif %}

<div class="container mt-4">
  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
