# fly.toml - Fly.io デプロイ設定
# fly launch で自動生成される app 名を設定する（fly launch 後に更新）

app = "attendance-app"   # ← fly launch 後に実際のアプリ名に変わる
primary_region = "nrt"   # 東京リージョン

[build]
  # Dockerfile を使ってビルド

[env]
  # SQLite のファイルを永続ボリューム（/data）に保存する
  DATABASE_URL = "sqlite:////data/attendance.db"
  # セッション署名キー（本番では fly secrets set SESSION_SECRET=xxx で設定する）

[http_service]
  internal_port = 8000
  force_https = true       # HTTP → HTTPS に自動リダイレクト
  auto_stop_machines = false   # 無料枠でもスリープさせない
  auto_start_machines = true

[[mounts]]
  # SQLite ファイルを永続化するためのボリューム設定
  # fly volumes create attendance_data --region nrt で事前作成が必要
  source = "attendance_data"
  destination = "/data"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
