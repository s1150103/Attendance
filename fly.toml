# fly.toml app configuration file generated for attendance-lingering-wave-4261 on 2026-02-26T15:10:25+09:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'attendance-lingering-wave-4261'
primary_region = 'nrt'

[build]

[env]
  DATABASE_URL = "sqlite:////data/attendance.db"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[mounts]]
  source = "attendance_data"
  destination = "/data"

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
